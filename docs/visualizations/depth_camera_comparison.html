<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Depth Camera Coverage Comparison</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0a0a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    overflow: hidden;
}
canvas { display: block; }
.controls {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    align-items: center;
    z-index: 10;
}
.controls select, .controls button, .controls label {
    padding: 6px 14px;
    background: #1e293b;
    color: #94a3b8;
    border: 1px solid #334155;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    transition: all 0.2s;
}
.controls select:hover, .controls button:hover { background: #334155; color: #e2e8f0; }
.controls label { cursor: pointer; display: flex; align-items: center; gap: 6px; }
.controls .separator { color: #475569; font-size: 13px; }
.view-toggle {
    display: flex;
    gap: 0;
}
.view-toggle button {
    border-radius: 0;
    border: 1px solid #334155;
    padding: 6px 14px;
    background: #1e293b;
    color: #94a3b8;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    transition: all 0.2s;
}
.view-toggle button:first-child { border-radius: 6px 0 0 6px; }
.view-toggle button:last-child { border-radius: 0 6px 6px 0; }
.view-toggle button.active { background: #334155; color: #e2e8f0; border-color: #475569; }
.view-toggle button:hover { background: #334155; color: #e2e8f0; }
</style>
</head>
<body>
<div class="controls">
    <span style="color:#64748b;font-size:13px;">Camera 1:</span>
    <select id="slot0" onchange="switchSlot(0)">
        <option value="None">None</option>
        <option value="D435" selected>D435</option>
        <option value="D455">D455</option>
        <option value="ZED">ZED</option>
        <option value="ZED-Mini">ZED Mini</option>
        <option value="OAK-D">OAK-D</option>
    </select>
    <span style="color:#64748b;font-size:13px;">Camera 2:</span>
    <select id="slot1" onchange="switchSlot(1)">
        <option value="None" selected>None</option>
        <option value="D435">D435</option>
        <option value="D455">D455</option>
        <option value="ZED">ZED</option>
        <option value="ZED-Mini">ZED Mini</option>
        <option value="OAK-D">OAK-D</option>
    </select>
    <span class="separator">|</span>
    <span style="color:#64748b;font-size:13px;">View:</span>
    <div class="view-toggle">
        <button id="btnRays" class="active" onclick="setViewMode('rays')">Rays</button>
        <button id="btnFrustum" onclick="setViewMode('frustum')">Frustum</button>
    </div>
    <span class="separator">|</span>
    <span style="color:#64748b;font-size:13px;">Near Box:</span>
    <select id="boxNear" onchange="switchBox()">
        <option value="None" selected>None</option>
        <option value="Small">Small</option>
        <option value="Medium">Medium</option>
        <option value="Large">Large</option>
    </select>
    <span style="color:#64748b;font-size:13px;">Far Box:</span>
    <select id="boxFar" onchange="switchBox()">
        <option value="None" selected>None</option>
        <option value="Small">Small</option>
        <option value="Medium">Medium</option>
        <option value="Large">Large</option>
    </select>
    <span class="separator">|</span>
    <span style="color:#64748b;font-size:13px;">Wall:</span>
    <select id="wallDist" onchange="switchWallDistance()">
        <option value="Close" selected>Close (~4m / ~13ft)</option>
        <option value="Mid">Depth Cam Max (~10m / ~33ft)</option>
        <option value="Far">Go2 L1 Max (~30m / ~98ft)</option>
    </select>
    <button id="pauseBtn" onclick="togglePause()">Pause</button>
    <button onclick="resetAnimation()">Reset</button>
    <button onclick="downloadPNG()">Download PNG</button>
</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 1920;
canvas.height = 1080;

// Scale canvas to fit viewport
function fitCanvas() {
    const sx = window.innerWidth / 1920;
    const sy = window.innerHeight / 1080;
    const s = Math.min(sx, sy, 1);
    canvas.style.width = (1920 * s) + 'px';
    canvas.style.height = (1080 * s) + 'px';
}
fitCanvas();
window.addEventListener('resize', fitCanvas);

// ─── World coordinates ───
const MARGIN = { top: 90, right: 120, bottom: 250, left: 160 };
const DRAW_W = 1920 - MARGIN.left - MARGIN.right;
const DRAW_H = 1080 - MARGIN.top - MARGIN.bottom;
let WORLD_W = 5.0;
const WORLD_H = 2.6;
let SCALE = Math.min(DRAW_W / WORLD_W, DRAW_H / WORLD_H);

let WALL_X = 4.2;
const CEIL_Z = 2.5;

// ─── Wall Distance Options ───
const WALL_DISTANCES = {
    'Close': { wallX: 4.2, worldW: 5.0 },
    'Mid':   { wallX: 10.5, worldW: 11.5 },
    'Far':   { wallX: 30.5, worldW: 32.0 }
};

// ─── Mount Position ───
const CAM_POS = { x: 0.50, z: 0.38 };

function w2c(wx, wz) {
    return [
        MARGIN.left + wx * SCALE,
        MARGIN.top + DRAW_H - wz * SCALE
    ];
}

// ─── Imperial conversion helper ───
function mToImp(m) {
    const totalIn = Math.round(m * 39.3701);
    const ft = Math.floor(totalIn / 12);
    const inch = totalIn % 12;
    return ft + '\'' + inch + '"';
}

// ─── Camera Registry ───
const CAMERAS = {
    'D435': { name: 'Intel D435/D435i', vFov: 58, hFov: 87, resX: 1280, resY: 720, minRange: 0.2, maxRange: 10, color: '#38bdf8', colorRgb: [56, 189, 248] },
    'D455': { name: 'Intel D455', vFov: 58, hFov: 87, resX: 1280, resY: 720, minRange: 0.6, maxRange: 6, color: '#f59e0b', colorRgb: [245, 158, 11] },
    'ZED': { name: 'Stereolabs ZED', vFov: 70, hFov: 110, resX: 2208, resY: 1242, minRange: 0.3, maxRange: 20, color: '#4ade80', colorRgb: [74, 222, 128] },
    'ZED-Mini': { name: 'ZED Mini', vFov: 60, hFov: 90, resX: 2208, resY: 1242, minRange: 0.1, maxRange: 15, color: '#a78bfa', colorRgb: [167, 139, 250] },
    'OAK-D': { name: 'Luxonis OAK-D Pro', vFov: 55, hFov: 80, resX: 1280, resY: 800, minRange: 0.2, maxRange: 15, color: '#fb7185', colorRgb: [251, 113, 133] }
};

// ─── Slot-Based State Management ───
const SLOTS = [
    { id: 'slot0', cameraKey: 'D435', originX: CAM_POS.x, originZ: CAM_POS.z, currentRays: [], particles: [] },
    { id: 'slot1', cameraKey: 'None', originX: CAM_POS.x, originZ: CAM_POS.z, currentRays: [], particles: [] }
];

// ─── View Mode ───
let viewMode = 'rays'; // 'rays' or 'frustum'

// ─── Floor Boxes ───
const BOX_SIZES = {
    'Small':  { label: 'Small (15cm)',  width: 0.15, height: 0.15 },
    'Medium': { label: 'Medium (30cm)', width: 0.30, height: 0.30 },
    'Large':  { label: 'Large (50cm)',  width: 0.50, height: 0.50 }
};
const NEAR_X = 1.2;
let FAR_X = 3.5;
let activeNearBox = 'None';
let activeFarBox = 'None';

function getBoxDef(size, baseX) {
    const s = BOX_SIZES[size];
    return { name: s.label, xPos: baseX - s.width / 2, width: s.width, height: s.height };
}

// ─── Ray Computation ───
function computeRays(cameraKey, originX, originZ) {
    const cam = CAMERAS[cameraKey];
    const numRays = Math.min(80, Math.round(cam.resY / 12));
    const fovTop = cam.vFov / 2;
    const fovBot = -cam.vFov / 2;
    const rays = [];

    for (let i = 0; i < numRays; i++) {
        const deg = fovTop - (cam.vFov * i / (numRays - 1));
        const rad = deg * Math.PI / 180;
        const dx = Math.cos(rad);
        const dz = Math.sin(rad);

        // Raycast to room surfaces
        const tWall = dx > 0 ? (WALL_X - originX) / dx : Infinity;
        const zWall = originZ + tWall * dz;

        const tFloor = dz < 0 ? (-originZ / dz) : Infinity;
        const xFloor = originX + tFloor * dx;

        const tCeil = dz > 0 ? ((CEIL_Z - originZ) / dz) : Infinity;
        const xCeil = originX + tCeil * dx;

        let hitX, hitZ, surface;

        if (tFloor > 0 && tFloor < tWall && xFloor >= 0 && xFloor <= WALL_X) {
            hitX = xFloor; hitZ = 0; surface = 'floor';
        } else if (tWall > 0 && zWall >= 0 && zWall <= CEIL_Z) {
            hitX = WALL_X; hitZ = zWall; surface = 'wall';
        } else if (tCeil > 0 && tCeil < Infinity && xCeil >= 0 && xCeil <= WALL_X) {
            hitX = xCeil; hitZ = CEIL_Z; surface = 'ceiling';
        } else {
            hitX = WALL_X; hitZ = Math.max(0, Math.min(CEIL_Z, zWall)); surface = 'wall';
        }

        // Clamp to maxRange
        const hitDist = Math.hypot(hitX - originX, hitZ - originZ);
        if (hitDist > cam.maxRange) {
            hitX = originX + dx * cam.maxRange;
            hitZ = originZ + dz * cam.maxRange;
            surface = 'range-limit';
        }

        // Mark if within minRange
        const clampedDist = Math.hypot(hitX - originX, hitZ - originZ);
        const inBlindZone = clampedDist < cam.minRange;

        rays.push({
            deg, rad, originX, originZ,
            hitX, hitZ, surface,
            length: clampedDist,
            inBlindZone
        });
    }
    return rays;
}

// ─── Drawing helpers ───
function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

function line(x1, y1, x2, y2) {
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
}

// ─── Draw functions ───
function drawBackground() {
    const grad = ctx.createRadialGradient(960, 540, 100, 960, 540, 900);
    grad.addColorStop(0, '#0f172a');
    grad.addColorStop(1, '#020617');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 1920, 1080);
}

function drawRoom() {
    // Floor
    const [fx1, fy] = w2c(0, 0);
    const [fx2] = w2c(WORLD_W, 0);
    ctx.strokeStyle = '#475569';
    ctx.lineWidth = 3;
    line(fx1, fy, fx2, fy);

    // Floor label
    ctx.fillStyle = '#64748b';
    ctx.font = '15px Inter, system-ui, sans-serif';
    ctx.textAlign = 'center';
    const [flx, fly] = w2c(WALL_X / 2, -0.08);
    ctx.fillText('FLOOR', flx, fly);

    // Wall (right side)
    const [wx, wy1] = w2c(WALL_X, 0);
    const [, wy2] = w2c(WALL_X, CEIL_Z);
    ctx.strokeStyle = '#475569';
    ctx.lineWidth = 3;
    line(wx, wy1, wx, wy2);

    // Wall label
    ctx.save();
    ctx.translate(wx + 22, (wy1 + wy2) / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.fillStyle = '#64748b';
    ctx.font = '15px Inter, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('WALL', 0, 0);
    ctx.restore();

    // Ceiling (dashed)
    const [cx1, cy] = w2c(0, CEIL_Z);
    const [cx2] = w2c(WORLD_W, CEIL_Z);
    ctx.setLineDash([10, 8]);
    ctx.strokeStyle = '#334155';
    ctx.lineWidth = 1.5;
    line(cx1, cy, cx2, cy);
    ctx.setLineDash([]);

    // Ceiling label
    ctx.fillStyle = '#475569';
    ctx.font = '13px Inter, system-ui, sans-serif';
    ctx.textAlign = 'center';
    const [clx, cly] = w2c(WALL_X / 2, CEIL_Z + 0.06);
    ctx.fillText('CEILING (~2.5m / ~8\'2")', clx, cly);

    // Height markers on wall
    ctx.fillStyle = '#475569';
    ctx.font = '12px Inter, system-ui, sans-serif';
    ctx.textAlign = 'right';
    for (let h = 0.5; h <= 2.0; h += 0.5) {
        const [mx, my] = w2c(WALL_X, h);
        ctx.fillStyle = '#475569';
        line(mx - 6, my, mx + 6, my);
        ctx.fillStyle = '#64748b';
        ctx.fillText(h.toFixed(1) + 'm (' + mToImp(h) + ')', mx - 12, my + 4);
    }

    // Distance annotation (robot to wall)
    const [rx] = w2c(CAM_POS.x, 0);
    const [wallMarkX] = w2c(WALL_X, 0);
    const distY = MARGIN.top + DRAW_H + 35;
    ctx.strokeStyle = '#475569';
    ctx.lineWidth = 1;
    line(rx, distY, wallMarkX, distY);
    line(rx, distY - 4, rx, distY + 4);
    line(wallMarkX, distY - 4, wallMarkX, distY + 4);
    ctx.fillStyle = '#94a3b8';
    ctx.font = '12px Inter, system-ui, sans-serif';
    ctx.textAlign = 'center';
    const distM = WALL_X - CAM_POS.x;
    ctx.fillText(distM.toFixed(1) + 'm (' + mToImp(distM) + ')', (rx + wallMarkX) / 2, distY - 6);
}

function drawRobot() {
    // Simplified Go2 side profile facing right
    const bodyL = 0.3, bodyR = 0.68;
    const bodyBot = 0.22, bodyTop = 0.34;

    // Legs
    ctx.strokeStyle = '#4c566a';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    // Back leg
    let [x1, y1] = w2c(0.36, bodyBot);
    let [x2, y2] = w2c(0.33, 0.12);
    let [x3, y3] = w2c(0.36, 0);
    line(x1, y1, x2, y2); line(x2, y2, x3, y3);
    // Front leg
    [x1, y1] = w2c(0.62, bodyBot);
    [x2, y2] = w2c(0.65, 0.12);
    [x3, y3] = w2c(0.62, 0);
    line(x1, y1, x2, y2); line(x2, y2, x3, y3);

    // Body
    const [bx1, by1] = w2c(bodyL, bodyTop);
    const [bx2, by2] = w2c(bodyR, bodyBot);
    ctx.fillStyle = '#334155';
    ctx.strokeStyle = '#4c566a';
    ctx.lineWidth = 2;
    roundRect(bx1, by1, bx2 - bx1, by2 - by1, 10);
    ctx.fill();
    ctx.stroke();

    // Head
    const [hx1, hy1] = w2c(0.68, 0.37);
    const [hx2, hy2] = w2c(0.78, 0.27);
    ctx.fillStyle = '#334155';
    roundRect(hx1, hy1, hx2 - hx1, hy2 - hy1, 6);
    ctx.fill();
    ctx.strokeStyle = '#4c566a';
    ctx.stroke();

    // Camera mount rectangle on back
    const anyActive = SLOTS[0].cameraKey !== 'None' || SLOTS[1].cameraKey !== 'None';
    if (anyActive) {
        const [cpx, cpy] = w2c(CAM_POS.x, CAM_POS.z);
        const camW = 16;
        const camH = 10;

        // Determine colors
        const slot0Active = SLOTS[0].cameraKey !== 'None';
        const slot1Active = SLOTS[1].cameraKey !== 'None';

        if (slot0Active && slot1Active) {
            // Both active: fill with slot1 color, outline with slot0 color
            const c1 = CAMERAS[SLOTS[1].cameraKey].color;
            const c0 = CAMERAS[SLOTS[0].cameraKey].color;
            ctx.fillStyle = c1;
            ctx.fillRect(cpx - camW / 2, cpy - camH / 2, camW, camH);
            ctx.strokeStyle = c0;
            ctx.lineWidth = 2;
            ctx.strokeRect(cpx - camW / 2, cpy - camH / 2, camW, camH);
        } else {
            const activeKey = slot0Active ? SLOTS[0].cameraKey : SLOTS[1].cameraKey;
            const col = CAMERAS[activeKey].color;
            ctx.fillStyle = col;
            ctx.fillRect(cpx - camW / 2, cpy - camH / 2, camW, camH);
            ctx.strokeStyle = col;
            ctx.lineWidth = 1.5;
            ctx.shadowBlur = 10;
            ctx.shadowColor = col;
            ctx.strokeRect(cpx - camW / 2, cpy - camH / 2, camW, camH);
            ctx.shadowBlur = 0;
        }
    }

    // Robot label
    ctx.fillStyle = '#94a3b8';
    ctx.font = 'bold 16px Inter, system-ui, sans-serif';
    ctx.textAlign = 'center';
    const [tx] = w2c(0.5, 0);
    const [, floorCanvasY] = w2c(0, 0);
    ctx.fillText('Unitree Go2', tx, floorCanvasY + 24);
}

// ─── Ray Drawing ───
function drawRays(rays, colorRgb, alpha) {
    rays.forEach(ray => {
        if (ray.inBlindZone) return; // Don't draw rays in blind zone
        const [ox, oy] = w2c(ray.originX, ray.originZ);
        const [hx, hy] = w2c(ray.hitX, ray.hitZ);
        ctx.strokeStyle = `rgba(${colorRgb[0]}, ${colorRgb[1]}, ${colorRgb[2]}, ${alpha})`;
        ctx.lineWidth = 1.5;
        line(ox, oy, hx, hy);
    });
}

// ─── Frustum Drawing ───
function drawFrustum(rays, cam, colorRgb, originX, originZ) {
    if (rays.length < 2) return;

    // Get the top and bottom ray hit points (non-blind-zone ones)
    const validRays = rays.filter(r => !r.inBlindZone);
    if (validRays.length < 2) return;

    const topRay = validRays[0];                       // highest angle
    const botRay = validRays[validRays.length - 1];    // lowest angle

    const [ox, oy] = w2c(originX, originZ);

    // Build polygon: origin -> follow top ray to hit -> trace surfaces -> bottom ray hit -> origin
    ctx.beginPath();
    ctx.moveTo(ox, oy);

    // Top ray hit
    const [tx, ty] = w2c(topRay.hitX, topRay.hitZ);
    ctx.lineTo(tx, ty);

    // Connect surfaces between top and bottom hits
    // We need to trace along room surfaces from topRay.hit to botRay.hit
    // Possible surfaces: ceiling, wall, floor (going clockwise in the side view)
    const surfacePoints = [];

    // Collect all corner points that fall between topRay hit and botRay hit
    const corners = [
        { x: WALL_X, z: CEIL_Z, label: 'ceiling-wall' },  // ceiling-wall corner
        { x: WALL_X, z: 0, label: 'wall-floor' }           // wall-floor corner
    ];

    // Determine which corners are inside the frustum
    // A corner is inside if it's between the top and bottom ray angles from origin
    const topAngle = Math.atan2(topRay.hitZ - originZ, topRay.hitX - originX);
    const botAngle = Math.atan2(botRay.hitZ - originZ, botRay.hitX - originX);

    corners.forEach(corner => {
        const cornerAngle = Math.atan2(corner.z - originZ, corner.x - originX);
        // Corner is inside if its angle is between botAngle and topAngle
        if (cornerAngle <= topAngle && cornerAngle >= botAngle) {
            surfacePoints.push(corner);
        }
    });

    // Sort surface points from top to bottom (by angle, descending)
    surfacePoints.sort((a, b) => {
        const aAngle = Math.atan2(a.z - originZ, a.x - originX);
        const bAngle = Math.atan2(b.z - originZ, b.x - originX);
        return bAngle - aAngle;
    });

    // Add surface corners to polygon
    surfacePoints.forEach(pt => {
        const [cx, cy] = w2c(pt.x, pt.z);
        ctx.lineTo(cx, cy);
    });

    // Bottom ray hit
    const [bx, by] = w2c(botRay.hitX, botRay.hitZ);
    ctx.lineTo(bx, by);

    // Close back to origin
    ctx.closePath();

    // Fill
    ctx.fillStyle = `rgba(${colorRgb[0]}, ${colorRgb[1]}, ${colorRgb[2]}, 0.08)`;
    ctx.fill();

    // Stroke outline
    ctx.strokeStyle = `rgba(${colorRgb[0]}, ${colorRgb[1]}, ${colorRgb[2]}, 0.3)`;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Draw maxRange cutoff dashed line if any ray hits range-limit
    const hasRangeLimit = rays.some(r => r.surface === 'range-limit');
    if (hasRangeLimit) {
        // Find the range-limit rays and draw a dashed arc/line at maxRange
        const topLimitRad = topRay.rad;
        const botLimitRad = botRay.rad;
        const [olx, oly] = w2c(originX, originZ);
        const maxR = cam.maxRange * SCALE;

        ctx.setLineDash([8, 6]);
        ctx.strokeStyle = `rgba(${colorRgb[0]}, ${colorRgb[1]}, ${colorRgb[2]}, 0.4)`;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(olx, oly, maxR, -topLimitRad, -botLimitRad, false);
        ctx.stroke();
        ctx.setLineDash([]);
    }
}

// ─── Impact Points ───
function drawImpactPoints(rays, colorRgb) {
    rays.forEach(ray => {
        if (ray.inBlindZone) return;
        if (ray.surface === 'range-limit') return;

        const [hx, hy] = w2c(ray.hitX, ray.hitZ);

        // Glow
        ctx.beginPath();
        ctx.arc(hx, hy, ray.surface === 'wall' ? 6 : 4, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${colorRgb[0]}, ${colorRgb[1]}, ${colorRgb[2]}, 0.15)`;
        ctx.fill();

        // Dot
        ctx.beginPath();
        ctx.arc(hx, hy, ray.surface === 'wall' ? 3.5 : 2.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${colorRgb[0]}, ${colorRgb[1]}, ${colorRgb[2]}, 0.9)`;
        ctx.fill();
    });
}

// ─── Min Range Blind Zone ───
function drawBlindZone(cam, originX, originZ) {
    const [ox, oy] = w2c(originX, originZ);
    const minR = cam.minRange * SCALE;
    const fovTopRad = cam.vFov / 2 * Math.PI / 180;
    const fovBotRad = -cam.vFov / 2 * Math.PI / 180;

    // Draw filled arc for blind zone
    ctx.beginPath();
    ctx.moveTo(ox, oy);
    ctx.arc(ox, oy, minR, -fovTopRad, -fovBotRad, false);
    ctx.closePath();
    ctx.fillStyle = 'rgba(239, 68, 68, 0.08)';
    ctx.fill();

    // Dashed outline
    ctx.setLineDash([6, 4]);
    ctx.strokeStyle = 'rgba(239, 68, 68, 0.3)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(ox, oy, minR, -fovTopRad, -fovBotRad, false);
    ctx.stroke();

    // Edge lines
    ctx.beginPath();
    ctx.moveTo(ox, oy);
    ctx.lineTo(ox + Math.cos(-fovTopRad) * minR, oy + Math.sin(-fovTopRad) * minR);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(ox, oy);
    ctx.lineTo(ox + Math.cos(-fovBotRad) * minR, oy + Math.sin(-fovBotRad) * minR);
    ctx.stroke();
    ctx.setLineDash([]);

    // Label
    const labelAngle = 0; // horizontal, to the right
    const labelDist = minR + 4;
    ctx.fillStyle = 'rgba(239, 68, 68, 0.7)';
    ctx.font = '11px Inter, system-ui, sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'bottom';
    ctx.fillText('Min: ' + cam.minRange.toFixed(1) + 'm (' + mToImp(cam.minRange) + ')', ox + labelDist, oy - 2);
    ctx.textBaseline = 'alphabetic';
}

// ─── Max Range Label ───
function drawMaxRangeLabel(cam, originX, originZ) {
    const maxDist = cam.maxRange;
    // Only show label if maxRange clips within the room
    const distToWall = WALL_X - originX;
    if (maxDist < distToWall + 0.5) {
        // maxRange is shorter than room -- show label at maxRange cutoff
        const labelX = originX + maxDist;
        const [lx, ly] = w2c(Math.min(labelX, WALL_X), originZ + 0.15);
        ctx.fillStyle = `rgba(${cam.colorRgb[0]}, ${cam.colorRgb[1]}, ${cam.colorRgb[2]}, 0.7)`;
        ctx.font = '11px Inter, system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Max: ' + maxDist + 'm (' + mToImp(maxDist) + ')', lx, ly);
    } else {
        // maxRange exceeds room -- show label near wall info area
        const [lx, ly] = w2c(WALL_X + 0.05, originZ + 0.08);
        ctx.fillStyle = `rgba(${cam.colorRgb[0]}, ${cam.colorRgb[1]}, ${cam.colorRgb[2]}, 0.5)`;
        ctx.font = '10px Inter, system-ui, sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText('Max: ' + maxDist + 'm (' + mToImp(maxDist) + ')', lx, ly);
    }
}

// ─── Particle System ───
function createParticles(rays) {
    const particles = [];
    rays.forEach(ray => {
        if (ray.inBlindZone) return;
        particles.push({
            ray,
            t: Math.random(),
            speed: 0.6 + Math.random() * 0.4,
            size: 2 + Math.random() * 2
        });
    });
    return particles;
}

function updateAndDrawParticles(particles, colorRgb, dt, updatePositions) {
    particles.forEach(p => {
        if (updatePositions) {
            p.t += dt / p.speed;
            if (p.t >= 1) {
                p.t -= 1;
                p.speed = 0.6 + Math.random() * 0.4;
            }
        }

        const px = p.ray.originX + (p.ray.hitX - p.ray.originX) * p.t;
        const pz = p.ray.originZ + (p.ray.hitZ - p.ray.originZ) * p.t;
        const [cx, cy] = w2c(px, pz);

        const alpha = 0.7 + 0.3 * p.t;
        ctx.beginPath();
        ctx.arc(cx, cy, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${colorRgb[0]}, ${colorRgb[1]}, ${colorRgb[2]}, ${alpha})`;
        ctx.fill();
    });
}

// ─── Controls ───
let paused = false;

function switchSlot(index) {
    const sel = document.getElementById(SLOTS[index].id);
    SLOTS[index].cameraKey = sel.value;
    recomputeSlot(index);
    invalidateCache();
}

function recomputeSlot(index) {
    const slot = SLOTS[index];
    if (slot.cameraKey === 'None') {
        slot.currentRays = [];
        slot.particles = [];
        return;
    }
    slot.currentRays = computeRays(slot.cameraKey, slot.originX, slot.originZ);
    slot.particles = createParticles(slot.currentRays);
}

function setViewMode(mode) {
    viewMode = mode;
    document.getElementById('btnRays').classList.toggle('active', mode === 'rays');
    document.getElementById('btnFrustum').classList.toggle('active', mode === 'frustum');
}

function switchBox() {
    activeNearBox = document.getElementById('boxNear').value;
    activeFarBox = document.getElementById('boxFar').value;
}

function switchWallDistance() {
    const cfg = WALL_DISTANCES[document.getElementById('wallDist').value];
    WALL_X = cfg.wallX;
    WORLD_W = cfg.worldW;
    SCALE = Math.min(DRAW_W / WORLD_W, DRAW_H / WORLD_H);
    FAR_X = WALL_X - 0.7;
    SLOTS.forEach((slot, i) => recomputeSlot(i));
    invalidateCache();
}

function togglePause() {
    paused = !paused;
    document.getElementById('pauseBtn').textContent = paused ? 'Play' : 'Pause';
}

function resetAnimation() {
    paused = false;
    document.getElementById('pauseBtn').textContent = 'Pause';

    SLOTS.forEach((slot, i) => recomputeSlot(i));
    invalidateCache();
}

function downloadPNG() {
    const link = document.createElement('a');
    link.download = 'depth_camera_comparison.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
}

// ─── Floor Box Drawing and Detection ───
function drawOneBox(box, locationLabel) {
    const [x1, y1] = w2c(box.xPos, box.height);
    const [x2, y2] = w2c(box.xPos + box.width, 0);
    const w = x2 - x1;
    const h = y2 - y1;

    // Filled rectangle
    ctx.fillStyle = 'rgba(148, 163, 184, 0.1)';
    ctx.fillRect(x1, y1, w, h);

    // Outline
    ctx.strokeStyle = '#94a3b8';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(x1, y1, w, h);

    // Label above box
    ctx.fillStyle = '#94a3b8';
    ctx.font = '11px Inter, system-ui, sans-serif';
    ctx.textAlign = 'center';
    const [lx, ly] = w2c(box.xPos + box.width / 2, box.height + 0.06);
    ctx.fillText(locationLabel + ': ' + box.name, lx, ly);
}

function drawFloorBoxes() {
    if (activeNearBox !== 'None') drawOneBox(getBoxDef(activeNearBox, NEAR_X), 'Near');
    if (activeFarBox !== 'None') drawOneBox(getBoxDef(activeFarBox, FAR_X), 'Far');
}

function checkBoxDetection(slotIndex, box) {
    const slot = SLOTS[slotIndex];
    if (slot.cameraKey === 'None') return false;
    const rays = slot.currentRays;
    const cam = CAMERAS[slot.cameraKey];

    for (const ray of rays) {
        // Blind zone filtering: skip rays that hit within minRange
        if (ray.inBlindZone) continue;

        // For downward rays (hitting floor): check if the ray crosses z=box.height
        // within the box's x range
        if (ray.hitZ <= box.height) {
            const dz = ray.hitZ - ray.originZ;
            const dx = ray.hitX - ray.originX;
            if (dz !== 0) {
                const t = (box.height - ray.originZ) / dz;
                if (t > 0 && t <= 1) {
                    const xAtBoxTop = ray.originX + dx * t;
                    if (xAtBoxTop >= box.xPos && xAtBoxTop <= box.xPos + box.width) {
                        // Additional blind zone check: distance to intersection point
                        const intDist = Math.hypot(xAtBoxTop - ray.originX, box.height - ray.originZ);
                        if (intDist >= cam.minRange) return true;
                    }
                }
            }
        }
        // Check if floor hit x lands within box x range
        if (ray.surface === 'floor' && ray.hitX >= box.xPos && ray.hitX <= box.xPos + box.width) {
            const hitDist = Math.hypot(ray.hitX - ray.originX, ray.hitZ - ray.originZ);
            if (hitDist >= cam.minRange) return true;
        }
        // Forward rays hitting wall: check if they pass through the box front face
        if (ray.surface === 'wall' || ray.surface === 'ceiling') {
            const dx = ray.hitX - ray.originX;
            const dz = ray.hitZ - ray.originZ;
            if (dx !== 0) {
                const t = (box.xPos - ray.originX) / dx;
                if (t > 0 && t <= 1) {
                    const zAtBoxFront = ray.originZ + dz * t;
                    if (zAtBoxFront >= 0 && zAtBoxFront <= box.height) {
                        const intDist = Math.hypot(box.xPos - ray.originX, zAtBoxFront - ray.originZ);
                        if (intDist >= cam.minRange) return true;
                    }
                }
            }
        }
    }

    return false;
}

// ─── Coverage and Density (cached) ───
const BAND_HEIGHT = 0.1;
const NUM_BANDS = Math.ceil(CEIL_Z / BAND_HEIGHT);

let cacheValid = false;
let cachedCoverage = [0, 0];
let cachedDensity = [null, null];

function invalidateCache() {
    cacheValid = false;
}

function recomputeCache() {
    if (cacheValid) return;
    cacheValid = true;
    for (let si = 0; si < 2; si++) {
        const slot = SLOTS[si];
        if (slot.cameraKey === 'None') {
            cachedCoverage[si] = 0;
            cachedDensity[si] = new Array(NUM_BANDS).fill(0);
            continue;
        }
        const bands = new Array(NUM_BANDS).fill(0);
        const coverageBands = new Set();

        slot.currentRays.forEach(r => {
            if (r.inBlindZone) return;
            if (r.surface === 'wall') {
                const idx = Math.floor(r.hitZ / BAND_HEIGHT);
                if (idx >= 0 && idx < NUM_BANDS) { bands[idx]++; coverageBands.add(idx); }
            }
        });
        cachedCoverage[si] = Math.round((coverageBands.size / NUM_BANDS) * 100);
        cachedDensity[si] = bands;
    }
}

function drawCoverageBars() {
    const activeSlots = [];
    SLOTS.forEach((slot, i) => {
        if (slot.cameraKey !== 'None') activeSlots.push(i);
    });
    if (activeSlots.length === 0) return;

    const barY = MARGIN.top + DRAW_H + 100;
    const barW = 400;
    const barH = 18;
    const startX = MARGIN.left;

    let row = 0;
    activeSlots.forEach(i => {
        const slot = SLOTS[i];
        const cam = CAMERAS[slot.cameraKey];
        const cov = cachedCoverage[i];
        const col = cam.colorRgb;
        const rowY = barY + row * 30;

        // Label
        ctx.fillStyle = `rgb(${col[0]},${col[1]},${col[2]})`;
        ctx.font = 'bold 13px Inter, system-ui, sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(cam.name, startX + 150, rowY + 13);

        // Color swatch
        ctx.fillStyle = `rgb(${col[0]},${col[1]},${col[2]})`;
        ctx.fillRect(startX + 156, rowY + 2, 10, 14);

        // Bar background
        const barStartX = startX + 174;
        ctx.fillStyle = '#1e293b';
        roundRect(barStartX, rowY, barW, barH, 4);
        ctx.fill();
        ctx.strokeStyle = '#334155';
        ctx.lineWidth = 1;
        ctx.stroke();

        // Filled portion
        if (cov > 0) {
            ctx.fillStyle = `rgba(${col[0]},${col[1]},${col[2]}, 0.6)`;
            roundRect(barStartX, rowY, barW * cov / 100, barH, 4);
            ctx.fill();
        }

        // Percentage
        ctx.fillStyle = '#e2e8f0';
        ctx.font = '13px Inter, system-ui, sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText(cov + '%', barStartX + barW + 10, rowY + 13);

        row++;
    });

    // Coverage label
    if (row > 0) {
        const barStartX = startX + 174;
        ctx.fillStyle = '#64748b';
        ctx.font = '11px Inter, system-ui, sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText('Wall Coverage', barStartX + barW / 2 - 35, barY - 8);
    }
}

// ─── Detection Legend ───
function drawDetectionRow(box, label, startX, startY, activeSlots) {
    ctx.fillStyle = '#cbd5e1';
    ctx.font = '12px Inter, system-ui, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(label + ' ' + box.name + ':', startX, startY);
    let xOff = startX + ctx.measureText(label + ' ' + box.name + ':').width + 10;

    activeSlots.forEach(si => {
        const cam = CAMERAS[SLOTS[si].cameraKey];
        const det = checkBoxDetection(si, box);
        ctx.fillStyle = det ? `rgb(${cam.colorRgb[0]},${cam.colorRgb[1]},${cam.colorRgb[2]})` : '#475569';
        ctx.font = '14px Inter, system-ui, sans-serif';
        ctx.fillText(det ? '\u2713' : '\u2717', xOff, startY);
        xOff += 16;
        ctx.fillStyle = `rgb(${cam.colorRgb[0]},${cam.colorRgb[1]},${cam.colorRgb[2]})`;
        ctx.font = '10px Inter, system-ui, sans-serif';
        ctx.fillText(cam.name, xOff, startY);
        xOff += ctx.measureText(cam.name).width + 12;
    });
}

function drawDetectionLegend() {
    if (activeNearBox === 'None' && activeFarBox === 'None') return;

    const activeSlots = [];
    SLOTS.forEach((slot, i) => {
        if (slot.cameraKey !== 'None') activeSlots.push(i);
    });
    if (activeSlots.length === 0) return;

    const startX = MARGIN.left;
    let startY = MARGIN.top + DRAW_H + 160;

    ctx.fillStyle = '#94a3b8';
    ctx.font = 'bold 12px Inter, system-ui, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('Box Detection:', startX, startY);

    if (activeNearBox !== 'None') {
        startY += 16;
        drawDetectionRow(getBoxDef(activeNearBox, NEAR_X), 'Near', startX + 10, startY, activeSlots);
    }
    if (activeFarBox !== 'None') {
        startY += 16;
        drawDetectionRow(getBoxDef(activeFarBox, FAR_X), 'Far', startX + 10, startY, activeSlots);
    }
}

// ─── Density Chart ───
function drawDensityChart() {
    const activeSlots = [];
    SLOTS.forEach((slot, i) => {
        if (slot.cameraKey !== 'None') activeSlots.push(i);
    });
    if (activeSlots.length === 0) return;

    const chartX = MARGIN.left + DRAW_W + 20;
    const chartW = 70;
    const [, chartTopY] = w2c(0, CEIL_Z);
    const [, chartBotY] = w2c(0, 0);
    const chartH = chartBotY - chartTopY;
    const bandPixH = chartH / NUM_BANDS;

    // Title
    ctx.fillStyle = '#64748b';
    ctx.font = '11px Inter, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Wall Density', chartX + chartW / 2, chartTopY - 8);

    // Background outline
    ctx.strokeStyle = '#334155';
    ctx.lineWidth = 1;
    ctx.strokeRect(chartX, chartTopY, chartW, chartH);

    // Use cached density data
    const allBands = activeSlots.map(si => cachedDensity[si]);
    const maxCount = Math.max(1, ...allBands.flat());

    // Draw overlaid bars for each slot
    for (let i = 0; i < NUM_BANDS; i++) {
        const bandY = chartBotY - (i + 1) * bandPixH;

        activeSlots.forEach((si, ai) => {
            const count = allBands[ai][i];
            if (count > 0) {
                const cam = CAMERAS[SLOTS[si].cameraKey];
                const bw = (count / maxCount) * chartW;
                const offsetY = ai * 1;
                ctx.fillStyle = `rgba(${cam.colorRgb[0]},${cam.colorRgb[1]},${cam.colorRgb[2]}, 0.5)`;
                ctx.fillRect(chartX, bandY + offsetY, bw, bandPixH - 1);
            }
        });
    }
}

// ─── Title ───
function drawTitle() {
    ctx.fillStyle = '#f1f5f9';
    ctx.font = 'bold 32px Inter, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Depth Camera Coverage Comparison', 960, 52);

    ctx.fillStyle = '#64748b';
    ctx.font = '17px Inter, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('How different depth cameras see a room from the Unitree Go2', 960, 80);
}

// ─── FOV Arc ───
function drawFOVArc(cam, originX, originZ, offset) {
    const [lx, ly] = w2c(originX, originZ);
    const radius = 50 + offset;

    const topRad = -(cam.vFov / 2) * Math.PI / 180;
    const botRad = -(-cam.vFov / 2) * Math.PI / 180;

    ctx.beginPath();
    ctx.arc(lx, ly, radius, topRad, botRad, false);
    ctx.strokeStyle = `rgba(${cam.colorRgb[0]},${cam.colorRgb[1]},${cam.colorRgb[2]}, 0.5)`;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Small lines at edges
    const topEndX = lx + Math.cos(topRad) * (radius + 6);
    const topEndY = ly + Math.sin(topRad) * (radius + 6);
    const topStartX = lx + Math.cos(topRad) * (radius - 6);
    const topStartY = ly + Math.sin(topRad) * (radius - 6);
    ctx.beginPath();
    ctx.moveTo(topStartX, topStartY);
    ctx.lineTo(topEndX, topEndY);
    ctx.stroke();

    const botEndX = lx + Math.cos(botRad) * (radius + 6);
    const botEndY = ly + Math.sin(botRad) * (radius + 6);
    const botStartX = lx + Math.cos(botRad) * (radius - 6);
    const botStartY = ly + Math.sin(botRad) * (radius - 6);
    ctx.beginPath();
    ctx.moveTo(botStartX, botStartY);
    ctx.lineTo(botEndX, botEndY);
    ctx.stroke();

    // FOV degree label at midpoint
    const midRad = 0; // symmetric FOV -> midpoint is at 0 degrees
    const labelR = radius + 16;
    const labelX = lx + Math.cos(midRad) * labelR;
    const labelY = ly + Math.sin(midRad) * labelR;

    ctx.fillStyle = `rgba(${cam.colorRgb[0]},${cam.colorRgb[1]},${cam.colorRgb[2]}, 0.8)`;
    ctx.font = '11px Inter, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(cam.vFov + '\u00B0', labelX, labelY);
    ctx.textBaseline = 'alphabetic';
}

// ─── Model Labels ───
function drawModelLabels() {
    const activeSlots = [];
    SLOTS.forEach((slot, i) => {
        if (slot.cameraKey !== 'None') activeSlots.push(i);
    });
    if (activeSlots.length === 0) return;

    const [lx, ly] = w2c(CAM_POS.x + 0.04, CAM_POS.z + 0.18);

    let yOff = 0;
    activeSlots.forEach(i => {
        const cam = CAMERAS[SLOTS[i].cameraKey];
        const col = cam.colorRgb;

        ctx.beginPath();
        ctx.arc(lx - 80, ly - 6 + yOff, 5, 0, Math.PI * 2);
        ctx.fillStyle = `rgb(${col[0]},${col[1]},${col[2]})`;
        ctx.fill();
        ctx.fillStyle = `rgb(${col[0]},${col[1]},${col[2]})`;
        ctx.font = '13px Inter, system-ui, sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText(cam.name, lx - 70, ly - 2 + yOff);

        // Specs line
        ctx.fillStyle = `rgba(${col[0]},${col[1]},${col[2]}, 0.6)`;
        ctx.font = '10px Inter, system-ui, sans-serif';
        ctx.fillText(`vFOV ${cam.vFov}\u00B0  hFOV ${cam.hFov}\u00B0  ${cam.resX}x${cam.resY}`, lx - 70, ly + 10 + yOff);

        yOff += 32;
    });
}

// ─── Initialize ───
let lastTime = 0;
resetAnimation();

// ─── Animation Loop ───
function draw(timestamp) {
    const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
    lastTime = timestamp;

    recomputeCache();

    drawBackground();
    drawRoom();
    drawFloorBoxes();

    // Determine active slots and ray alpha
    const activeCount = SLOTS.filter(s => s.cameraKey !== 'None').length;
    const rayAlpha = activeCount > 1 ? 0.10 : 0.15;

    // Draw FOV arcs for each active slot
    let fovOffset = 0;
    SLOTS.forEach((slot, i) => {
        if (slot.cameraKey === 'None') return;
        const cam = CAMERAS[slot.cameraKey];
        drawFOVArc(cam, slot.originX, slot.originZ, fovOffset);
        fovOffset += 25;
    });

    // Draw rays/frustum, hits, particles, blind zones for each active slot
    SLOTS.forEach((slot, i) => {
        if (slot.cameraKey === 'None') return;
        const cam = CAMERAS[slot.cameraKey];

        // Draw blind zone
        drawBlindZone(cam, slot.originX, slot.originZ);

        if (viewMode === 'rays') {
            drawRays(slot.currentRays, cam.colorRgb, rayAlpha);
            drawImpactPoints(slot.currentRays, cam.colorRgb);
            updateAndDrawParticles(slot.particles, cam.colorRgb, dt, !paused);
        } else {
            // Frustum mode
            drawFrustum(slot.currentRays, cam, cam.colorRgb, slot.originX, slot.originZ);
            drawImpactPoints(slot.currentRays, cam.colorRgb);
        }

        // Max range label
        drawMaxRangeLabel(cam, slot.originX, slot.originZ);
    });

    drawRobot();
    drawTitle();
    drawModelLabels();
    drawCoverageBars();
    drawDensityChart();
    drawDetectionLegend();

    requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
