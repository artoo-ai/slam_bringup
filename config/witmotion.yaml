# WitMotion WT901C / WT9011 — slam_bringup-internal Python driver config.
#
# This config feeds the wt901c_imu node defined in
# slam_bringup/slam_bringup/wt901c_imu_node.py. We do NOT use the
# ElettraSar/witmotion_ros driver — it only decodes legacy 0x51-0x54
# packets and silently drops the WT901C's combined 0x61 frames.
#
# Port: prefer /dev/serial/by-id/<id> for stable enumeration. After plugging
# the WT901C run `ls /dev/serial/by-id/` and pin the symlink. /dev/ttyUSB0
# is the fallback that works when only one USB-serial device is attached.
#
# Baud: WT901C ships configured at 115200 in 0x61 mode. Do NOT use 9600 —
# at that baud the device emits garbage 0x55 framing and the parser will
# burn CPU on resync. If you ever reconfigure the device with WitMotion's
# PC tool, update the baud here in lockstep.

wt901c_imu:
  ros__parameters:
    port: /dev/ttyUSB0
    baud: 115200
    frame_id: imu_link
    topic: /imu/data
    stats_period_sec: 5.0
    # Trust the device's persistent (EEPROM) rate config — we set 200 Hz
    # once during Phase 1.5 bring-up and the device remembers across
    # power cycles. Override with `output_rate_hz:=200` (or 100, 50, ...)
    # for a one-time reconfiguration if the device ever loses its config.
    output_rate_hz: 0
