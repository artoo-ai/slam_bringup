# Nav2 parameters for the SIMPLIFIED 2D stack (slam_2d.launch.py).
#
# Stack topology this config assumes:
#   slam_toolbox (localization)   → /map + map → odom TF
#   rf2o_laser_odometry           → /odom + odom → base_link TF
#   pointcloud_to_laserscan       → /scan from /livox/lidar (Mid-360, flattened)
#
# Nav2 frames:
#   global_frame     = map           (slam_toolbox graph-corrected)
#   robot_base_frame = base_link     (URDF root, per platform)
#   odom_topic       = /odom         (rf2o, NOT FAST-LIO2's /Odometry)
#
# This file is the 2D twin of nav2_params.yaml. The only meaningful delta
# is the odom topic name (/odom instead of /Odometry) and the absence of
# the FAST-LIO2 camera_init alias — slam_toolbox publishes map → odom
# directly, so no static TF rewiring is needed in the 2D launch.
#
# Cmd output: /cmd_vel (geometry_msgs/Twist) — consumed by yahboom_bridge
# on the mecanum platform.
#
# Footprint: circular, radius 0.25 m (chassis 0.18 + off-center fixture
# overhang margin — see robot_radius comments below). Tune per-platform via:
#   ./start_nav_2d.sh nav2_params_file:=/path/to/platform_params_2d.yaml

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    # default_nav_to_pose_bt_xml / default_nav_through_poses_bt_xml are
    # INTENTIONALLY NOT SET. Setting them to empty string ("") is NOT
    # "use the default" — it's "use this empty path", which produces
    # "Behavior tree threw exception: Empty Tree. Exiting with failure"
    # and aborts every goal at the BT layer. Omitting the keys lets
    # nav2_bt_navigator load its package-default BT XML from
    # nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml.
    # If you want a custom BT, set the FULL absolute path here.
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    # Mecanum-tuned: below ~0.05 rad/s the wheels slip in place without
    # actually rotating the chassis (static friction wins). Old value 0.001
    # made the controller try tiny yaw corrections that produced no motion,
    # so it would sit "trying" near the goal until progress_checker aborted.
    min_theta_velocity_threshold: 0.05
    failure_tolerance: 0.3
    odom_topic: /odom
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    # PoseProgressChecker (NOT SimpleProgressChecker) so YAW motion counts
    # as progress. With SimpleProgressChecker the rover sitting at the goal
    # correcting heading was registering as "no progress" (it tracks xy
    # radius only) and getting aborted before yaw converged. Mecanum can't
    # converge pure-rotation yaw quickly — see RotateToGoal tuning below
    # and the broader project memory on mecanum yaw stall.
    progress_checker:
      plugin: "nav2_controller::PoseProgressChecker"
      required_movement_radius: 0.3
      required_movement_angle: 0.05    # rad — ~3°; yaw motion counts as progress
      movement_time_allowance: 25.0    # bumped 10 → 25 s for slow yaw convergence
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      # Mecanum-physics-driven default. 0.40 rad (~23°) accepts that the
      # rover physically cannot reliably converge tighter than this on
      # indoor floors — pure-rotation yaw at zero linear velocity scrubs
      # the rollers, slips/grabs, and oscillates. Tighter tolerances are
      # achievable while path-following (the rollers spin freely during
      # translation), but final-pose yaw is the worst case for mecanum.
      # Bumped from 0.35 after live testing showed even 0.5 wasn't always
      # converging due to friction asymmetry between wheels.
      yaw_goal_tolerance: 0.40
    # DWB local planner — configured for HOLONOMIC (mecanum) by default.
    # The mecanum rover (YB-ERF01 X3) is the primary platform, so vy is
    # enabled so DWB samples strafe trajectories. Diff-drive platforms
    # MUST override max_vel_y/acc_lim_y/decel_lim_y to 0.0 in a
    # per-platform params file (otherwise DWB will emit vy that the
    # firmware can't execute). Y limits match the bridge's max_vy default
    # (0.3 m/s) — going higher would have DWB plan trajectories the
    # bridge will silently clamp.
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: False
      min_vel_x: -0.26
      min_vel_y: -0.3
      max_vel_x: 0.5
      max_vel_y: 0.3
      # max_vel_theta 1.5 → 0.6: ROTATION SPEED IS CAPPED BY THE LASER
      # ODOMETRY, not the wheels. The /scan is a 100 ms aggregation of the
      # Mid-360's sweeping pattern, so at 1.0+ rad/s each scan is smeared
      # 6-9° internally and rf2o stops tracking rotation almost entirely
      # (observed: commanded wz=1.0, rf2o reported 0.03 rad/s). slam_toolbox
      # then gets rotated scans with a stationary odom seed, its matcher
      # blows past the ±20° search window, and the map smears with ghost
      # walls. 0.6 rad/s ≈ 3.4°/scan — trackable. The stiction problem is
      # handled by acc_lim_theta 5.0 (torque impulse), NOT top speed; do
      # not raise this past ~0.8 unless odometry stops being laser-only
      # (Option B wheel+IMU EKF). velocity_smoother + behavior_server
      # limits below match.
      max_vel_theta: 0.6
      min_speed_xy: 0.0
      max_speed_xy: 0.5
      min_speed_theta: 0.0
      acc_lim_x: 2.5
      acc_lim_y: 2.0
      acc_lim_theta: 5.0
      decel_lim_x: -2.5
      decel_lim_y: -2.0
      decel_lim_theta: -5.0
      vx_samples: 20
      vy_samples: 10
      # vtheta_samples 20 → 8: forces DWB to pick from a coarser set of yaw
      # rates rather than wasting samples on tiny commands that mecanum
      # can't execute anyway. Coarser samples means each chosen rotation
      # is bigger and more likely to overcome static friction.
      vtheta_samples: 8
      sim_time: 1.7
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.25
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: True
      stateful: True
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      # slowing_factor 5.0 was too aggressive — robot crawled into the goal
      # heading at velocities below the mecanum-rotation threshold and the
      # progress checker would abort before convergence. 2.0 lets it close
      # the heading at a useful rate while still slowing near the target.
      RotateToGoal.slowing_factor: 2.0
      # lookahead_time: -1.0 means "use slowing_factor" (the slow crawl).
      # 0.5 means "target the heading needed 0.5 s ahead at full rate" —
      # the controller commands bigger, more impulsive rotations near the
      # goal instead of throttling down. On mecanum this is the difference
      # between "endless oscillation" and "snap to heading."
      RotateToGoal.lookahead_time: 0.5

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: false
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      # robot_radius 0.18 → 0.25. The bare chassis bounding circle is
      # ~0.18 m (27×24 cm → √((0.135)² + (0.12)²)), but the sensor fixture
      # rides OFF-CENTER on the rover, so part of it extends past 0.18
      # from base_link — at 0.18 the planner hugged corners/door frames
      # and the overhanging side clipped them. 0.25 buys ~7 cm of overhang
      # margin while keeping a 0.76 m doorway passable (0.76 − 2×0.25 =
      # 0.26 m free corridor for the path centerline). To refine: measure
      # the max horizontal distance from base_link origin to the farthest
      # fixture corner and set robot_radius to exactly that. The precise
      # alternative is an asymmetric `footprint:` polygon instead of
      # robot_radius.
      robot_radius: 0.25
      # low_obstacle_layer is a SEPARATE ObstacleLayer instance, not a
      # second source inside obstacle_layer, on purpose: sources within
      # one layer share a grid, so the main /scan's clearing rays (which
      # pass OVER a dog bowl and return from surfaces beyond) would
      # raytrace the bowl's cell empty exactly as the robot approaches.
      # Separate layers combine by maximum — low-band marks survive
      # high-band clearing. inflation_layer stays last so it inflates
      # the combined result.
      plugins: ["obstacle_layer", "low_obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          # max_obstacle_height matches the upper end of nav2.launch.py's
          # pointcloud→laserscan slice. Set higher than scan_max_height
          # only wastes CPU; set lower silently drops legit obstacles.
          max_obstacle_height: 0.5
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 15.0
          raytrace_min_range: 0.0
          obstacle_max_range: 10.0
          obstacle_min_range: 0.0
      low_obstacle_layer:
        # Ankle-height clutter (dog bowls ~0.06-0.10 m, shoes) from
        # /scan_low — the 0.05..0.15 m band published by livox_to_scan_low
        # in slam_2d.launch.py. Mid-360 geometry means these are only
        # visible ≥ ~2 m out (0.329 m mount, -7.2° lower FOV edge), so
        # marks made on approach must persist while the robot closes in.
        # Clearing here comes only from /scan_low's own returns, which is
        # rare by design; stale marks age out as the rolling window moves.
        # obstacle_max_range 4.0 keeps transient low-band floor noise
        # (accel pitch on the rubber isolators) from marking at distance.
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan_low
        scan_low:
          topic: /scan_low
          max_obstacle_height: 0.5
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 4.5
          raytrace_min_range: 0.0
          obstacle_max_range: 4.0
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        # inflation_radius 0.20 → 0.30, tracking robot_radius 0.18 → 0.25
        # (inflation must exceed robot_radius or the soft-cost band
        # vanishes). History: 0.15 → 0.20 after the rover wedged into a
        # corner — laser-only odom error plus mecanum slip ate the whole
        # margin. With the off-center fixture now covered by robot_radius
        # 0.25, this leaves a 5 cm decaying band beyond the lethal zone.
        # A ~0.76 m doorway centerline (0.38 m from each jamb) sits past
        # the 0.30 band, so it still has a zero-cost centerline. If
        # doorway passage starts failing, drop back toward 0.26.
        inflation_radius: 0.30
      always_send_full_costmap: True

  # In the 2D stack, slam_toolbox (localization mode) publishes map → odom
  # directly, and rf2o publishes odom → base_link. The frame "odom" exists
  # natively — no static-TF rewiring like the 3D path needs for the
  # FAST-LIO2 camera_init alias.

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: false
      # Match local_costmap robot_radius (chassis 0.18 + off-center
      # fixture overhang margin — see local_costmap comment for the math).
      robot_radius: 0.25
      resolution: 0.05
      track_unknown_space: true
      # IMPORTANT: obstacle_layer is INTENTIONALLY OMITTED from the
      # global costmap. Reasons:
      #   1. The global plan should follow the saved slam_toolbox
      #      occupancy grid (static_layer ← /map), not transient live
      #      obstacles that may include odometry drift artifacts.
      #   2. Live /scan obstacles can mis-register against the saved /map
      #      between sessions; adding obstacle_layer here double-stamps
      #      cells with mismatched poses, producing walls of magenta that
      #      block every plan.
      #   3. local_costmap still has obstacle_layer for transient
      #      reactivity — that's where it belongs.
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        subscribe_to_updates: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        # Match local_costmap inflation — see comment above for the math.
        inflation_radius: 0.30
      always_send_full_costmap: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 1.0
    use_sim_time: false
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait", "assisted_teleop"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.1
    use_sim_time: false
    simulate_ahead_time: 2.0
    # Tracks DWB FollowPath max_vel_theta — see the rotation-smear comment
    # there. Spin recoveries are the WORST offender for map smear (long
    # sustained rotation), so they get the same 0.6 rad/s ceiling. min 0.4
    # keeps the spin impulsive enough to break mecanum stiction; the
    # rotational_acc_lim 5.0 provides the torque impulse.
    max_rotational_vel: 0.6
    min_rotational_vel: 0.4
    rotational_acc_lim: 5.0

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    # Y axis enabled for mecanum. Numbers track DWB FollowPath limits
    # above (theta capped at 0.6 for laser-odometry rotation tracking —
    # see the max_vel_theta comment; accel stays 5.0 so the smoother
    # doesn't soften the stiction-breaking impulse). If you swap to a
    # diff-drive platform, zero the Y entries in a per-platform override.
    max_velocity: [0.5, 0.3, 0.6]
    min_velocity: [-0.26, -0.3, -0.6]
    max_accel: [2.5, 2.0, 5.0]
    max_decel: [-2.5, -2.0, -5.0]
    odom_topic: "/odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
