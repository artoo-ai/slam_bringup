# Nav2 parameters for the SIMPLIFIED 2D stack (slam_2d.launch.py).
#
# Stack topology this config assumes:
#   slam_toolbox (localization)   → /map + map → odom TF
#   rf2o_laser_odometry           → /odom + odom → base_link TF
#   pointcloud_to_laserscan       → /scan from /livox/lidar (Mid-360, flattened)
#
# Nav2 frames:
#   global_frame     = map           (slam_toolbox graph-corrected)
#   robot_base_frame = base_link     (URDF root, per platform)
#   odom_topic       = /odom         (rf2o, NOT FAST-LIO2's /Odometry)
#
# This file is the 2D twin of nav2_params.yaml. The only meaningful delta
# is the odom topic name (/odom instead of /Odometry) and the absence of
# the FAST-LIO2 camera_init alias — slam_toolbox publishes map → odom
# directly, so no static TF rewiring is needed in the 2D launch.
#
# Cmd output: /cmd_vel (geometry_msgs/Twist) — consumed by yahboom_bridge
# on the mecanum platform.
#
# Footprint: circular, radius 0.4 m. Tune per-platform via:
#   ./start_nav_2d.sh nav2_params_file:=/path/to/platform_params_2d.yaml

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    # default_nav_to_pose_bt_xml / default_nav_through_poses_bt_xml are
    # INTENTIONALLY NOT SET. Setting them to empty string ("") is NOT
    # "use the default" — it's "use this empty path", which produces
    # "Behavior tree threw exception: Empty Tree. Exiting with failure"
    # and aborts every goal at the BT layer. Omitting the keys lets
    # nav2_bt_navigator load its package-default BT XML from
    # nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml.
    # If you want a custom BT, set the FULL absolute path here.
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    # Mecanum-tuned: below ~0.05 rad/s the wheels slip in place without
    # actually rotating the chassis (static friction wins). Old value 0.001
    # made the controller try tiny yaw corrections that produced no motion,
    # so it would sit "trying" near the goal until progress_checker aborted.
    min_theta_velocity_threshold: 0.05
    failure_tolerance: 0.3
    odom_topic: /odom
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      # Loosened 0.25 → 0.35 rad (~14° → ~20°). Mecanum struggles to converge
      # the last few degrees of yaw at zero linear velocity; 20° is the
      # sweet spot most consumer indoor robots use, and it gets the rover
      # to "facing roughly the right direction" without endless spinning.
      yaw_goal_tolerance: 0.35
    # DWB local planner — configured for HOLONOMIC (mecanum) by default.
    # The mecanum rover (YB-ERF01 X3) is the primary platform, so vy is
    # enabled so DWB samples strafe trajectories. Diff-drive platforms
    # MUST override max_vel_y/acc_lim_y/decel_lim_y to 0.0 in a
    # per-platform params file (otherwise DWB will emit vy that the
    # firmware can't execute). Y limits match the bridge's max_vy default
    # (0.3 m/s) — going higher would have DWB plan trajectories the
    # bridge will silently clamp.
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: False
      min_vel_x: -0.26
      min_vel_y: -0.3
      max_vel_x: 0.5
      max_vel_y: 0.3
      max_vel_theta: 1.0
      min_speed_xy: 0.0
      max_speed_xy: 0.5
      min_speed_theta: 0.0
      acc_lim_x: 2.5
      acc_lim_y: 2.0
      acc_lim_theta: 3.2
      decel_lim_x: -2.5
      decel_lim_y: -2.0
      decel_lim_theta: -3.2
      vx_samples: 20
      vy_samples: 10
      vtheta_samples: 20
      sim_time: 1.7
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.25
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: True
      stateful: True
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      # slowing_factor 5.0 was too aggressive — robot crawled into the goal
      # heading at velocities below the mecanum-rotation threshold and the
      # progress checker would abort before convergence. 2.0 lets it close
      # the heading at a useful rate while still slowing near the target.
      RotateToGoal.slowing_factor: 2.0
      RotateToGoal.lookahead_time: -1.0

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: false
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      # robot_radius matches the Yahboom YB-ERF01 X3 mecanum's actual
      # bounding circle — chassis is ~27×24 cm, so √((0.135)² + (0.12)²)
      # ≈ 0.18 m. Old 0.25 was a generic indoor default; combined with
      # inflation_radius 0.30 it left a 0.55 m forbidden zone from every
      # wall and refused to plan through doorways < 1.10 m wide. Override
      # per-platform if your rover is bigger.
      robot_radius: 0.18
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          # max_obstacle_height matches the upper end of nav2.launch.py's
          # pointcloud→laserscan slice. Set higher than scan_max_height
          # only wastes CPU; set lower silently drops legit obstacles.
          max_obstacle_height: 0.5
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 15.0
          raytrace_min_range: 0.0
          obstacle_max_range: 10.0
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        # inflation_radius reduced 0.30 → 0.15 to let the planner thread
        # through narrow doorways/corridors. With robot_radius 0.18, the
        # total forbidden zone from a wall is now 0.33 m, so corridors
        # ≥ 0.66 m have a clear centerline. A typical interior doorway is
        # ~0.76 m, so this leaves ~5 cm clearance per side — tight but
        # navigable. Raise back to 0.20–0.25 if the rover starts clipping
        # door frames.
        inflation_radius: 0.15
      always_send_full_costmap: True

  # In the 2D stack, slam_toolbox (localization mode) publishes map → odom
  # directly, and rf2o publishes odom → base_link. The frame "odom" exists
  # natively — no static-TF rewiring like the 3D path needs for the
  # FAST-LIO2 camera_init alias.

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: false
      # Match local_costmap robot_radius (Yahboom mecanum bounding circle).
      robot_radius: 0.18
      resolution: 0.05
      track_unknown_space: true
      # IMPORTANT: obstacle_layer is INTENTIONALLY OMITTED from the
      # global costmap. Reasons:
      #   1. The global plan should follow the saved slam_toolbox
      #      occupancy grid (static_layer ← /map), not transient live
      #      obstacles that may include odometry drift artifacts.
      #   2. Live /scan obstacles can mis-register against the saved /map
      #      between sessions; adding obstacle_layer here double-stamps
      #      cells with mismatched poses, producing walls of magenta that
      #      block every plan.
      #   3. local_costmap still has obstacle_layer for transient
      #      reactivity — that's where it belongs.
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        subscribe_to_updates: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        # Match local_costmap inflation — see comment above for the math.
        inflation_radius: 0.15
      always_send_full_costmap: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 1.0
    use_sim_time: false
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait", "assisted_teleop"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.1
    use_sim_time: false
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    # Y axis enabled for mecanum. Numbers track DWB FollowPath limits
    # above; if you swap to a diff-drive platform, zero the Y entries
    # in a per-platform override file.
    max_velocity: [0.5, 0.3, 1.0]
    min_velocity: [-0.26, -0.3, -1.0]
    max_accel: [2.5, 2.0, 3.2]
    max_decel: [-2.5, -2.0, -3.2]
    odom_topic: "/odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
